---
# Zypper does not support version globbing, so resolve the exact version
- name: Resolve pinned DRBD module version
  ansible.builtin.shell:
    cmd: >-
      zypper --non-interactive se -s --match-exact {{ _drbd_module_package }}
      | awk -F'|' '$4 ~ /^ *{{ drbd_install_module_version }}/ {
      gsub(/^ +| +$/, "", $4); print $4; exit }'
  register: _drbd_suse_version
  changed_when: false
  when: drbd_install_module_version | length > 0

- name: Pin DRBD module package version
  ansible.builtin.set_fact:
    drbd_install_packages: >-
      {{ drbd_install_packages
         | reject('equalto', _drbd_module_package)
         | list
         + [_drbd_module_package + '=' + _drbd_suse_version.stdout] }}
  when:
    - drbd_install_module_version | length > 0
    - _drbd_suse_version.stdout | length > 0

- name: Check for DRBD updates
  community.general.zypper:
    name: "{{ drbd_install_packages }}"
    state: "{{ drbd_install_package_state }}"
    oldpackage: true
    extra_args: --force-resolution
  check_mode: true
  register: _drbd_check
