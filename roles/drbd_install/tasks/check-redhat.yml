---
- name: Pin DRBD module package version
  when: drbd_install_module_version | length > 0
  ansible.builtin.set_fact:
    drbd_install_packages: >-
      {{ drbd_install_packages
         | reject('equalto', _drbd_module_package)
         | list
         + [drbd_install_pinned_module] }}

# nobest: true needed if non-RHEL releases lag behind on kernel releases
- name: Check if DRBD packages need changes
  ansible.builtin.dnf:
    name: "{{ drbd_install_packages }}"
    state: "{{ drbd_install_package_state }}"
    nobest: true
    allow_downgrade: true
  check_mode: true
  register: _drbd_check
