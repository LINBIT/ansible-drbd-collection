---
- name: Load OS-specific tasks for drbd_install
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "install-{{ ansible_facts['distribution'] | lower }}.yml"
        - "install-{{ ansible_facts['os_family'] | lower }}.yml"
      paths:
        - "{{ role_path }}/tasks"
      skip: true

- name: Open firewall ports for DRBD
  ansible.builtin.include_tasks: open-firewall.yml
  when: drbd_install_firewall_rules | bool

- name: Install DKMS prerequisites (Red Hat family)
  ansible.builtin.include_tasks: prereq-dkms-redhat.yml
  when:
    - drbd_install_force_dkms | bool
    - ansible_facts['os_family'] | lower == 'redhat'

- name: Install DRBD packages
  ansible.builtin.include_tasks: "package-install-{{ ansible_facts['os_family'] | lower }}.yml"

- name: Verify DRBD DKMS module built for the running kernel
  ansible.builtin.command:
    cmd: "dkms status -m drbd -k {{ ansible_facts['kernel'] }}"
  when: "'drbd-dkms' in drbd_install_packages"
  register: _drbd_install_dkms_check
  changed_when: false

- name: Build DRBD DKMS modules for the running kernel
  when:
    - "'drbd-dkms' in drbd_install_packages"
    - "'installed' not in _drbd_install_dkms_check.stdout"
  block:
    - name: Run dkms autoinstall for the running kernel
      ansible.builtin.command:
        cmd: "dkms autoinstall -k {{ ansible_facts['kernel'] }}"
      changed_when: true

    - name: Re-check DRBD DKMS module status after build
      ansible.builtin.command:
        cmd: "dkms status -m drbd -k {{ ansible_facts['kernel'] }}"
      register: _drbd_install_dkms_recheck
      changed_when: false

- name: Assert DRBD DKMS module is installed for the running kernel
  ansible.builtin.assert:
    that: >-
      'installed' in (_drbd_install_dkms_recheck.stdout
        | default(_drbd_install_dkms_check.stdout, true))
    fail_msg: >-
      DRBD DKMS module is not installed for the running kernel
      ({{ ansible_facts['kernel'] }}). dkms status output:
      {{ _drbd_install_dkms_recheck.stdout
        | default(_drbd_install_dkms_check.stdout, true)
        | default('<empty>') }}.
      Check that kernel headers for {{ ansible_facts['kernel'] }} are
      installed and inspect `journalctl -t dkms` for build errors.
    quiet: true
  when: "'drbd-dkms' in drbd_install_packages"

- name: Load DRBD kernel module
  community.general.modprobe:
    name: drbd
    state: present

- name: Check loaded DRBD kernel module version
  ansible.builtin.slurp:
    src: /sys/module/drbd/version
  register: _drbd_install_post_version

# If the in-tree 8.x module was already loaded, rmmod and reload to pick up 9.x.
- name: Unload DRBD 8.x kernel module
  community.general.modprobe:
    name: drbd
    state: absent
  when: (_drbd_install_post_version.content | b64decode | trim) is match('^8\.')

- name: Reload DRBD 9 kernel module
  community.general.modprobe:
    name: drbd
    state: present
  when: (_drbd_install_post_version.content | b64decode | trim) is match('^8\.')

# Always re-check the version for the final assert.
- name: Verify DRBD kernel module version
  ansible.builtin.slurp:
    src: /sys/module/drbd/version
  register: _drbd_install_post_version

- name: Assert DRBD 9 kernel module is loaded
  ansible.builtin.assert:
    that: not (_drbd_install_post_version.content | b64decode | trim) is match('^8\.')
    fail_msg: >-
      DRBD 8.x kernel module is loaded
      ({{ _drbd_install_post_version.content | b64decode | trim }}).
      Expected DRBD 9.x. A reboot may be required to load the updated module.
    quiet: true

- name: Lock DRBD module package version
  ansible.builtin.include_tasks: "lock-{{ ansible_facts['os_family'] | lower }}.yml"
  when: drbd_install_module_version | length > 0
