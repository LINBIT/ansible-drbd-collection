---
# pahole: needed for DKMS builds with BTF-enabled kernels. PVE kernel headers lack
# this dependency (unlike stock Debian), affecting QDevice nodes running the PVE
# kernel without a full Proxmox VE install.
- name: Queue DRBD pre-req packages (Proxmox PVE)
  ansible.builtin.set_fact:
    drbd_install_prereqs: "{{ drbd_install_prereqs + ['proxmox-default-headers', 'pahole'] }}"
  when:
    - ansible_facts['distribution'] | lower == 'debian'
    - "'pve' in ansible_facts['kernel']"

- name: Queue DRBD pre-req packages (Debian OS)
  ansible.builtin.set_fact:
    drbd_install_prereqs: "{{ drbd_install_prereqs + ['linux-headers-amd64'] }}"
  when:
    - ansible_facts['distribution'] | lower == 'debian'
    - "'pve' not in ansible_facts['kernel']"

- name: Queue DRBD pre-req packages (Ubuntu OS)
  ansible.builtin.set_fact:
    drbd_install_prereqs: "{{ drbd_install_prereqs + ['linux-headers-generic'] }}"
  when: ansible_facts['distribution'] | lower == 'ubuntu'
