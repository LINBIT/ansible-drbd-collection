---
- name: Queue DRBD kernel header packages for the running kernel
  ansible.builtin.set_fact:
    drbd_install_prereqs: "{{ drbd_install_prereqs + (ansible_facts | linbit.common.dkms_kernel_headers) }}"

- name: Queue pahole for Proxmox VE BTF DKMS builds
  ansible.builtin.set_fact:
    drbd_install_prereqs: "{{ drbd_install_prereqs + ['pahole'] }}"
  when: ansible_facts | linbit.common.is_pve
