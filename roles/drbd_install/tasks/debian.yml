---
- name: Queue DRBD pre-req packages (Proxmox PVE)
  ansible.builtin.set_fact:
    drbd_install_prereqs: "{{ drbd_install_prereqs + ['proxmox-default-headers'] }}"
  when:
    - ansible_distribution | lower == 'debian'
    - "'pve' in ansible_kernel"

- name: Queue DRBD pre-req packages (Debian OS)
  ansible.builtin.set_fact:
    drbd_install_prereqs: "{{ drbd_install_prereqs + ['linux-headers-amd64'] }}"
  when:
    - ansible_distribution | lower == 'debian'
    - "'pve' not in ansible_kernel"

- name: Queue DRBD pre-req packages (Ubuntu OS)
  ansible.builtin.set_fact:
    drbd_install_prereqs: "{{ drbd_install_prereqs + ['linux-headers-generic'] }}"
  when: ansible_distribution | lower == 'ubuntu'
