---
# Zypper does not support version globbing, so resolve the exact version
- name: Resolve pinned DRBD module version (Zypper)
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail;
      zypper --non-interactive se -s --match-exact {{ _drbd_module_package }}
      | awk -F'|' '$4 ~ /^ *{{ drbd_install_module_version }}/ {
      gsub(/^ +| +$/, "", $4); print $4; exit }'
  register: _drbd_suse_version
  changed_when: false

- name: Pin DRBD module package version (Zypper)
  ansible.builtin.set_fact:
    drbd_install_packages: >-
      {{ drbd_install_packages
         | reject('equalto', _drbd_module_package)
         | list
         + [_drbd_module_package + '=' + _drbd_suse_version.stdout] }}
  when: _drbd_suse_version.stdout | length > 0
