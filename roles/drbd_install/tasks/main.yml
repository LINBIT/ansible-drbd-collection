---
# tasks file for drbd_install
- name: Load OS-specific variables for drbd_install
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts['distribution'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}.yml"
      paths:
        - "{{ role_path }}/vars"
      skip: true

- name: Unlock DRBD module package version
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "unlock-{{ ansible_facts['os_family'] | lower }}.yml"
      paths:
        - "{{ role_path }}/tasks"
  when: drbd_install_module_version | length == 0

- name: Check for DRBD updates
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "check-{{ ansible_facts['os_family'] | lower }}.yml"
      paths:
        - "{{ role_path }}/tasks"

- name: Install and configure DRBD
  ansible.builtin.include_tasks: install-drbd.yml
  when: _drbd_check is changed
