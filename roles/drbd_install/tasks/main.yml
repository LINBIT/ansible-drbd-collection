---
# tasks file for drbd_install
- name: Load OS-specific variables for drbd_install
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution | lower }}.yml"
        - "{{ ansible_os_family | lower }}.yml"
      paths:
        - "{{ role_path }}/vars"
      skip: true

- name: Load OS-specific tasks for drbd_install
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution | lower }}.yml"
        - "{{ ansible_os_family | lower }}.yml"
      paths:
        - "{{ role_path }}/tasks"
      skip: true

- name: Check if firewalld is running
  ansible.builtin.command: systemctl status firewalld
  register: drbd_firewalld
  failed_when: drbd_firewalld.rc not in [0, 3, 4]
  changed_when: false
  when: ansible_os_family | lower in ['redhat', 'suse']

# Use LINSTOR port range 7000-8000
- name: Open firewalld ports for DRBD
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  with_items:
    - '7000-8000/tcp'
  when:
    - drbd_firewalld.rc is defined
    - drbd_firewalld.rc == 0

# nobest -> true needed if non-RHEL releases lag behind on kernel releases
- name: Install LINBIT DRBD packages (Red Hat OS family)
  ansible.builtin.dnf:
    name: "{{ drbd_install_prereqs + drbd_packages }}"
    state: present
    nobest: true
  when: ansible_os_family | lower == 'redhat'

- name: Install LINBIT DRBD packages (All other OS)
  ansible.builtin.package:
    name: "{{ drbd_install_prereqs + drbd_packages }}"
    state: present
  when: ansible_os_family | lower != 'redhat'
  notify: restart_multipathd
