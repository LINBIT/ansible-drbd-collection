# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Install DRBD kernel module and userspace tools
    description:
      - Install DRBD kernel module and userspace tools.
      - Re-running the role upgrades DRBD packages when newer versions are available.
      - Set C(drbd_install_package_state=present) to skip upgrades and only install missing packages.
    options:
      drbd_install_package_state:
        type: str
        default: latest
        choices:
          - latest
          - present
        description:
          - "Package state: C(latest) installs or upgrades, C(present) installs only."
      drbd_install_module_version:
        type: str
        default: ""
        description:
          - Pin the DRBD module package to a specific version, for example C(9.2.17) or C(9.3.0).
          - Also locks the package in the OS package manager to prevent accidental upgrades.
      drbd_install_force_dkms:
        type: bool
        default: false
        description:
          - Install C(drbd-dkms) instead of C(kmod-drbd) on RHEL-family distros.
          - >-
            Automatically installs EPEL, enables CRB or PowerTools, and pulls unversioned C(kernel-devel)
            (or C(kernel-uek-devel) on UEK).
          - >-
            Defaults to C(true) on Oracle Linux 9 and newer because LINBIT does not ship kmod packages for
            those releases.
          - Debian/Ubuntu always use DKMS regardless of this flag.
      drbd_install_prereqs:
        type: list
        elements: str
        default: []
        description:
          - Prerequisite packages for DRBD.
          - Populated by OS-specific vars files.
      drbd_install_packages:
        type: list
        elements: str
        default: []
        description:
          - DRBD packages to install.
          - Populated by OS-specific vars files.
      drbd_install_version_separator:
        type: str
        default: "="
        description:
          - Version separator for package pinning.
          - Debian uses C(=), RedHat uses C(-). Set by OS-specific vars files.
      drbd_install_pinned_module:
        type: str
        description:
          - Computed package name with version pin for the DRBD module package.
          - Only used when C(drbd_install_module_version) is set.
      drbd_install_drbdproxy:
        type: bool
        default: false
        description:
          - Optionally install DRBD Proxy alongside the DRBD stack.
      drbd_install_firewall_rules:
        type: bool
        default: true
        description:
          - Manage firewall rules for DRBD ports.
          - Set C(false) to skip firewall configuration.
      drbd_install_firewall_ports:
        type: list
        elements: dict
        default:
          - port: "7000-8000"
            proto: tcp
        description:
          - Ports to open in firewalld or UFW for DRBD replication.
      drbd_install_force_reconfigure:
        type: bool
        default: false
        description:
          - Force re-running the install/configure block even when DRBD 9 is
            already installed and no upgrade or version pin is requested.
          - Re-asserts firewall ports, re-checks the loaded kernel module,
            and re-runs the package lock step.
          - Use for drift correction; redundant on fresh installs (the
            existing C(when:) clauses already trigger the block).
