---
# defaults file for drbd_install

drbd_install_prereqs: []

drbd_install_package_state: present

drbd_install_force_dkms: false

drbd_install_module_version: ""

drbd_install_version_separator: "="

drbd_install_pinned_module: "{{ _drbd_module_package }}{{ drbd_install_version_separator }}{{ drbd_install_module_version }}*"

drbd_install_packages: []

# Install drbd-proxy alongside the rest of the DRBD stack
drbd_install_drbdproxy: false

drbd_install_firewall_rules: true

drbd_install_firewall_ports:
  - { port: '7000-8000', proto: tcp }

drbd_install_force_reconfigure: false

# Mask drbd-graceful-shutdown.service - useful for Pacemaker
drbd_install_mask_shutdown_service: false
