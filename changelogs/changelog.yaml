---
ancestor: 0.9.6
releases:
  0.9.7:
    changes:
      bugfixes:
        - 'drbd_install - flush handlers at end of role so subsequent plays see the
          freshly installed kernel module without waiting for the global post-task
          flush.

          '
      minor_changes:
        - 'drbd_install - optional DRBD Proxy package installation via ``drbd_install_drbdproxy:
          true``.

          '
        - 'drbd_install - optional masking of ``drbd-shutdown.service`` via ``drbd_install_mask_shutdown_service:
          true`` for setups that manage DRBD shutdown out of band.

          '
    fragments:
      - drbd_install_drbdproxy.yml
      - drbd_install_flush_handlers.yml
      - drbd_install_mask_shutdown.yml
    release_date: '2026-05-13'
  0.9.8:
    changes:
      bugfixes:
        - 'drbd_install - pin the DKMS verification to the running kernel and add
          a post-build assert, so the role fails on real DKMS build failures for the
          running kernel instead of accepting a stale ``installed`` status from an
          unrelated kernel slot.

          '
    fragments:
      - drbd_install_dkms_kernel_pinned_check.yml
    release_date: '2026-05-21'
