---
bugfixes:
  - >
    drbd_install - select kernel headers for the running kernel via the new
    ``linbit.common.dkms_kernel_headers`` filter. On Debian/Ubuntu this picks the
    correct flavor/edition metapackage (cloud, aws, ...) instead of assuming
    stock/generic, so DKMS builds DRBD on cloud and specialized kernels. On
    RHEL/Oracle Linux it picks the variant-matched devel package
    (``kernel-uek-devel`` on UEK, ``kernel-rt-devel`` on Real Time,
    ``kernel-64k-devel`` on aarch64 64K-page) instead of always
    ``kernel-devel``.
